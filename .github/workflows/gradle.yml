name: Nightly Release

on:
  push:
    branches: [ main ]
  repository_dispatch:
    types: [ postgresql_jdbc_bumped ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.client_payload.ref || 'main' }}
          fetch-depth: 0

      - name: Extract Changelog
        id: changelog
        run: |
          NOTES=""
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            NOTES="${{ github.event.client_payload.changelog }}"
          else
            NOTES=$(git log -1 --pretty=%B)
          fi
          {
            echo 'notes<<EOFM'
            echo "$NOTES"
            echo 'EOFM'
          } >> "$GITHUB_OUTPUT"

      - name: Set up JDK21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build Shaded JAR
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Locate JAR & extract version
        id: locate
        run: |
          set -e
          # Read the version straight from gradle.properties — this matches the
          # project version defined in build.gradle (library_version+release_date)
          # and works for any version string, including pre-releases.
          lib_ver=$(grep '^library_version=' gradle.properties | cut -d'=' -f2)
          rel_date=$(grep '^release_date=' gradle.properties | cut -d'=' -f2)
          if [ -z "$lib_ver" ] || [ -z "$rel_date" ]; then
            echo "::error::Could not read library_version/release_date from gradle.properties" && exit 1
          fi
          ver="${lib_ver}+${rel_date}"

          jar_path=$(ls -1 build/libs/*-all.jar | head -n1)
          if [ -z "$jar_path" ]; then echo "::error::Could not find the *-all.jar file" && exit 1; fi

          echo "jar=$jar_path" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "Resolved version '$ver' from JAR '$jar_path'

      - name: Publish Nightly Release
        uses: ncipollo/release-action@v1
        with:
          tag: "nightly-${{ steps.locate.outputs.ver }}"
          name: "Nightly ${{ steps.locate.outputs.ver }}"
          body: ${{ steps.changelog.outputs.notes }}
          artifacts: ${{ steps.locate.outputs.jar }}
          prerelease: true
          makeLatest: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: minecraft-postgresql-jdbc
          path: ${{ steps.locate.outputs.jar }}

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: K5Z3fRB2
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: true
          modrinth-unfeature-mode: subset
          files: ${{ steps.locate.outputs.jar }}
          name: ${{ steps.locate.outputs.ver }}
          version: ${{ steps.locate.outputs.ver }}
          version-type: release
          changelog: ${{ steps.changelog.outputs.notes }}
          loaders: |
            bukkit
            spigot
            paper
            folia
            purpur
            forge
            neoforge
            quilt
            fabric

          game-versions: |
            >=1.12.2

          retry-attempts: 2
          retry-delay:   10000
          fail-mode: fail
